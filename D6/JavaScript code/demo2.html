<html>
    <head>
        <script>
            document.write("<table border='1'>")
                for(var i = 0; i < 1000; i++) {
                    document.write("<tr>")
                if (i % 2 == 0) {
                    document.write("<td bgcolor='red'>" + i + "</td>")
                } else{
                    document.write("<td bgcolor='yellow'>"+i+"</td>")
                }
                document.write("</tr>")

                }
                document.write("</table>")
        </script>
    </head>
</html>
